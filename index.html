<!DOCTYPE html>
<html>
<head>
<title>GitHub URL Superpowers</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0d1117;
color:white;
text-align:center;
margin-top:120px;
}

.container{
width:520px;
margin:auto;
padding:30px;
background:#161b22;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h2{
margin-bottom:5px;
}

.caption{
color:#8b949e;
font-size:14px;
margin-bottom:25px;
line-height:1.5;
}

input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #30363d;
background:#0d1117;
color:white;
margin-bottom:15px;
}

button{
padding:10px 20px;
background:#238636;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2ea043;
}

.links{
margin-top:25px;
text-align:left;
}

.link-box{
margin-bottom:18px;
padding:12px;
background:#0d1117;
border-radius:6px;
border:1px solid #30363d;
}

.link-box a{
color:#58a6ff;
text-decoration:none;
font-weight:bold;
}

.link-box p{
margin:5px 0 0 0;
font-size:13px;
color:#8b949e;
}

</style>
</head>

<body>

<div class="container">

<h2>GitHub URL Superpowers</h2>

<div class="caption">
Paste a GitHub repository URL and instantly generate powerful developer tools 
that help you explore, analyze, and visualize the repository.
</div>

<input
id="urlInput"
type="text"
placeholder="https://github.com/owner/repo"
/>

<button onclick="generate()">Generate Links</button>

<div id="result" class="links"></div>

</div>

<script>

function generate(){

let url = document.getElementById("urlInput").value;

if(!url.includes("github.com")){
alert("Enter valid GitHub URL");
return;
}

let path = url.split("github.com")[1];

let links = `

<div class="link-box">
<a href="https://github.dev${path}" target="_blank">
Open in github.dev
</a>
<p>Launch the repository in a browser-based VS Code editor. Browse, search, and edit code without cloning the repository.</p>
</div>

<div class="link-box">
<a href="https://gitmcp.io${path}" target="_blank">
Open in gitmcp.io
</a>
<p>Prepare the repository for AI code exploration. Helps AI tools understand the project structure and analyze the codebase.</p>
</div>

<div class="link-box">
<a href="https://gitingest.com${path}" target="_blank">
Open in gitingest.com
</a>
<p>Convert the entire repository into structured context that can be used by AI models for deeper analysis and explanations.</p>
</div>

<div class="link-box">
<a href="https://gitdiagram.com${path}" target="_blank">
Open in gitdiagram.com
</a>
<p>Automatically generate a visual architecture diagram showing the folder hierarchy and structure of the repository.</p>
</div>

`;

document.getElementById("result").innerHTML = links;

}

</script>

</body>
</html>
